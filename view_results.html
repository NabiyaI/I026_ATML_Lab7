<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATML Lab 7 - View Results</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.5; }
        .btn { display: inline-block; padding: 14px 28px; background-color: #2ea44f; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: background-color 0.2s; cursor: pointer; border: none; font-size: 16px; width: 100%; box-sizing: border-box;}
        .btn:hover { background-color: #2c974b; }
        .note { margin-top: 25px; font-size: 13px; color: #777; background: #f6f8fa; padding: 10px; border-radius: 5px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Project Results Menu</h1>
        <p>This will open the newly generated HTML report containing the translation model comparison, text summaries, and data plots.</p>
        
        <button class="btn" onclick="openResults()">View Project Output</button>
        
        <p class="note"><b>Note:</b> Make sure you have run your project script (<code>python train.py</code>) first so that the results actually exist!</p>
    </div>

    <script>
        function openResults() {
            // Opens the dynamically generated HTML report in a new window/tab
            window.open('results/experiment_report.html', '_blank', 'width=1000,height=800,noopener,noreferrer');
        }
    </script>
</body>
</html>
